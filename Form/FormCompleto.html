<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <form action="">
        <label for="nome">Digite seu nome: </label> 
        <input type="text" id="nome" placeholder="Nome: "> <br>

        <label for="email"> Digite seu email: </label>
        <input type="email" id="email" placeholder="email: "> <br>

        <label for="senha">Digite sua senha: </label>
        <input type="password" id="senha" placeholder="Senha: "> <br>

        <label for="idade">Digite sua idade: </label>
        <input type="number" id="idade" placeholder="Idade: "> <br>

        <label for="nascimento">Digite sua data de nascimento: </label>
        <input type="date" id="nascimento"> <br>

        <label> Qual seu sexo? </label> <br>
        <input type="radio" id="masculino" name="sexo"> 
        <label for="masculino">Masculino</label>
        <input type="radio" id="feminino" name="sexo">
        <label for="feminino">Feminino</label>


        <p>Quais seus hobbies</p>
        <input type="checkbox" id="jogar">
        <label for="jogar">Jogar</label>

        <input type="checkbox" id="estudar">
        <label for="estudar">Estudar</label>

        <input type="checkbox" id="Trabalhar">
        <label for="Trabalhar">Trabalhar</label> <br>


        <label for="cidade">Cidade</label>
        <select id="cidade">
            <option> Selecione uma opcao </option>
            <option> Belo Horizonte </option>
            <option> Sao paulo </option>
            <option> Rio de janeiro </option>
        </select> <br>


        <label for="comentario">Digite um comentario: </label> <br>
        <textarea name="" id="comentario"></textarea> <br>
        
        <button type="submit">Enviar!</button>

    </form>
</body>
</html>
